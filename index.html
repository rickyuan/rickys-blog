<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricky's Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a28;
  --border: #1e1e2e;
  --border-glow: #3b3b5c;
  --text: #e0e0e8;
  --text-dim: #6b6b80;
  --text-muted: #4a4a5e;
  --cyan: #00d4aa;
  --cyan-dim: #00d4aa33;
  --purple: #8b5cf6;
  --purple-dim: #8b5cf622;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
  --sans: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated grid background ── */
.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.3;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
}

/* ── Glow orbs ── */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.glow-orb.cyan {
  width: 400px; height: 400px;
  background: var(--cyan);
  opacity: 0.06;
  top: -100px; right: 10%;
  animation: float 20s ease-in-out infinite;
}
.glow-orb.purple {
  width: 350px; height: 350px;
  background: var(--purple);
  opacity: 0.05;
  bottom: 10%; left: 5%;
  animation: float 25s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(30px, -20px); }
  66% { transform: translate(-20px, 15px); }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ── Header ── */
.site-header {
  padding: 80px 0 20px;
}

.terminal-prompt {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.terminal-prompt .cursor {
  display: inline-block;
  width: 8px;
  height: 16px;
  background: var(--cyan);
  animation: blink 1.2s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.site-title {
  font-family: var(--mono);
  font-size: 2.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.site-desc {
  color: var(--text-dim);
  font-size: 0.95rem;
  font-weight: 300;
  max-width: 560px;
  line-height: 1.8;
}

.site-desc .highlight {
  color: var(--cyan);
  font-family: var(--mono);
  font-size: 0.85rem;
}

/* ── Stats bar ── */
.stats-bar {
  display: flex;
  gap: 32px;
  margin: 40px 0;
  padding: 20px 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 0.78rem;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-label {
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.68rem;
}

.stat-value {
  color: var(--cyan);
  font-weight: 700;
  font-size: 1.1rem;
}

/* ── Category filter ── */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.filter-btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.filter-btn:hover {
  border-color: var(--border-glow);
  color: var(--text);
}

.filter-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-dim);
}

/* ── Post cards ── */
.posts {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 80px;
}

.post-card {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 16px;
  text-decoration: none;
  color: inherit;
  padding: 24px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.post-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--cyan);
  opacity: 0;
  transition: opacity 0.25s;
}

.post-card:hover {
  border-color: var(--border-glow);
  background: var(--bg-card-hover);
  transform: translateX(4px);
}

.post-card:hover::before {
  opacity: 1;
}

.post-info {
  min-width: 0;
}

.post-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 3px;
  margin-bottom: 10px;
}

.post-tag[data-t="culture"] { color: var(--purple); background: var(--purple-dim); }
.post-tag[data-t="life"] { color: var(--cyan); background: var(--cyan-dim); }
.post-tag[data-t="work"] { color: var(--blue); background: #3b82f622; }
.post-tag[data-t="education"] { color: var(--amber); background: #f59e0b22; }

.post-title {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.4;
}

.post-excerpt {
  color: var(--text-dim);
  font-size: 0.85rem;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.post-date {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  white-space: nowrap;
  padding-top: 4px;
}

/* ── Footer ── */
.site-footer {
  padding: 40px 0;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-muted);
}

.site-footer a {
  color: var(--cyan);
  text-decoration: none;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .container { padding: 0 16px; }
  .site-header { padding: 48px 0 16px; }
  .site-title { font-size: 2rem; }
  .stats-bar { gap: 20px; flex-wrap: wrap; padding: 16px; }
  .post-card { grid-template-columns: 1fr; padding: 20px; }
  .post-date { padding-top: 0; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb cyan"></div>
<div class="glow-orb purple"></div>

<div class="container">

  <header class="site-header">
    <div class="terminal-prompt">
      <span>~/rickys-space $</span>
      <span>cat README.md</span>
      <span class="cursor"></span>
    </div>
    <h1 class="site-title">Ricky's Space</h1>
    <p class="site-desc">
      文化 · 生活 · 工作 · 教育 — 用 <span class="highlight">AI</span> 辅助思考，<br>
      记录一些值得分享的探索与发现。
    </p>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Posts</span>
      <span class="stat-value" id="stat-posts">1</span>
    </div>
    <div class="stat">
      <span class="stat-label">Categories</span>
      <span class="stat-value">4</span>
    </div>
    <div class="stat">
      <span class="stat-label">Powered by</span>
      <span class="stat-value" style="font-size:0.85rem;">Claude + Human</span>
    </div>
    <div class="stat">
      <span class="stat-label">Status</span>
      <span class="stat-value" style="font-size:0.85rem;">&#9679; Online</span>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-category="all">* all</button>
    <button class="filter-btn" data-category="culture"># culture</button>
    <button class="filter-btn" data-category="life"># life</button>
    <button class="filter-btn" data-category="work"># work</button>
    <button class="filter-btn" data-category="education"># education</button>
  </div>

  <main class="posts" id="posts">

    <a class="post-card" href="posts/culture/90s-pop-culture.html" data-category="culture">
      <div class="post-info">
        <span class="post-tag" data-t="culture">culture</span>
        <h2 class="post-title">90 年代流行文化深度研究</h2>
        <p class="post-excerpt">从港台音乐到好莱坞大片，从街机游戏到互联网萌芽，一份关于 90 年代流行文化的全景式深度档案。</p>
      </div>
      <span class="post-date">2026-04-19</span>
    </a>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Ricky's Space &middot; built with curiosity &amp; <a href="#">Claude</a></p>
  </footer>

</div>

<script>
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.category;
    document.querySelectorAll('.post-card').forEach(card => {
      card.style.display = (cat === 'all' || card.dataset.category === cat) ? '' : 'none';
    });
  });
});
</script>

</body>
</html>
